on:
  workflow_call:
    inputs:
      libheif_release:
        required: true
        type: string
jobs:
  imager-file-heif:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: install dependencies cached
        uses: tonycoz/cache-apt-pkgs-action@v1-node-20-warning
        with:
          packages: build-essential libgif-dev libwebp-dev libde265-dev automake autoconf libtool m4 git yasm pkgconf libx265-dev libopenjp2-7-dev libjpeg-turbo8-dev libaom-dev libsvtav1-dev librav1e-dev libopenh264-dev libavcodec-dev libavutil-dev libpng-dev libjpeg-turbo8-dev liblocal-lib-perl jq libx264-dev libdav1d-dev libsvtav1-dev
          version: 1.2
      - name: variables
        run: |
            export INSTALL_PATH="$(realpath local)"
            echo "INSTALL_PATH=$INSTALL_PATH" >>$GITHUB_ENV
            export PKG_CONFIG_PATH="$INSTALL_PATH/lib/pkgconfig"
            echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH" >>$GITHUB_ENV

      - name: cache libheif
        id: cache-libheif
        uses: actions/cache@v5
        with:
          path: local
          key: libheif-${{ inputs.libheif_release }}-v3

      - name: install libheif
        if: steps.cache-libheif.outputs.cache-hit != 'true'
        run: |
            wget https://github.com/strukturag/libheif/releases/download/v${{ inputs.libheif_release }}/libheif-${{ inputs.libheif_release }}.tar.gz
            tar xzf libheif-${{ inputs.libheif_release }}.tar.gz
            cd libheif-${{ inputs.libheif_release }}
            mkdir build
            # some versions don't find the de265 plugin
            # this still uses a lot of ignored options
            cmake -LAH
            release="${{ inputs.libheif_release }}"
            echo release=$release
            case "$release" in
            1.11.*|1.12.*|1.13.*)
              # everything it finds is on by default
              options=""
              ;;
            1.14.*|1.15.*)
              options="-DWITH_AOM_DECODER=ON \
                -DWITH_AOM_ENCODER=ON \
                -DWITH_DAV1D=ON \
                -DWITH_DEFLATE_HEADER_COMPRESSION=ON \
                -DWITH_LIBDE265=ON \
                -DWITH_RAV1E=ON \
                -DWITH_SvtEnc=ON"
              ;;
            1.16.*)
              # add "uncompressed"
              options="-DWITH_AOM_DECODER=ON \
                -DWITH_AOM_ENCODER=ON \
                -DWITH_DAV1D=ON \
                -DWITH_DEFLATE_HEADER_COMPRESSION=ON \
                -DWITH_LIBDE265=ON \
                -DWITH_RAV1E=ON \
                -DWITH_SvtEnc=ON
                -DWITH_COMPRESSED_CODEC=ON"
              ;;
            *)
              echo default
              options="-DWITH_AOM_DECODER_PLUGIN=ON \
                -DWITH_AOM_ENCODER_PLUGIN=ON \
                -DWITH_DAV1D=ON \
                -DWITH_DAV1D_PLUGIN=ON \
                -DWITH_HEADER_COMPRESSION=ON \
                -DWITH_FFMPEG_DECODER=ON \
                -DWITH_FFMPEG_DECODER_PLUGIN=ON \
                -DWITH_JPEG_DECODER=ON \
                -DWITH_JPEG_DECODER_PLUGIN=ON \
                -DWITH_JPEG_ENCODER=ON \
                -DWITH_JPEG_ENCODER_PLUGIN=ON \
                -DWITH_KVAZAAR=ON \
                -DWITH_KVAZAAR_PLUGIN=ON \
                -DWITH_LIBDE265=ON \
                -DWITH_LIBSHARPYUV=ON \
                -DWITH_OpenH264_DECODER=ON \
                -DWITH_OpenH264_ENCODER=ON \
                -DWITH_OpenJPEG_DECODER=ON \
                -DWITH_OpenJPEG_DECODER_PLUGIN=ON \
                -DWITH_OpenJPEG_ENCODER=ON \
                -DWITH_OpenJPEG_ENCODER_PLUGIN=ON \
                -DWITH_RAV1E=ON \
                -DWITH_RAV1E_PLUGIN=ON \
                -DWITH_SvtEnc=ON \
                -DWITH_SvtEnc_PLUGIN=ON \
                -DWITH_UNCOMPRESSED_CODEC=ON"
              ;;
            esac
            echo options=$options
            cmake --install-prefix "$INSTALL_PATH" -B build $options
            cd build
            make
            make install

      - name: libheif environment
        run: |
            echo "$INSTALL_PATH/bin" >>$GITHUB_PATH
            echo "LD_LIBRARY_PATH=$INSTALL_PATH/lib" >>$GITHUB_ENV

      - name: libheif tools
        run: |
            # 1.11 and earlier don't install tools
            echo LD_LIBRARY_PATH=$LD_LIBRARY_PATH
            [ -x $INSTALL_PATH/bin/heif-enc ] && heif-enc --list-encoders || true
            [ -x $INSTALL_PATH/bin/heif-dec ] && heif-dec --list-decoders || true
            [ -x $INSTALL_PATH/bin/heif-convert ] && heif-convert --list-decoders || true

      - name: local-lib environment
        run: |
            perl -Mlocal::lib | grep -v '^PATH' >source.sh
            . source.sh
            for name in $(sed -e 's/=.*//' <source.sh) ; do
               echo "$name=${!name}" >>$GITHUB_ENV
            done
            echo "$PERL_LOCAL_LIB_ROOT/bin" >>$GITHUB_PATH

      - name: imager prep
        run: |
            echo IMAGER_RELEASE=$(curl -sS 'https://fastapi.metacpan.org/v1/release/Imager' | jq -r '.["version"]') >>$GITHUB_ENV
            echo PERL_VERSION=$(perl -e 'print $^V') >>$GITHUB_ENV

      - name: cache imager
        id: cache-imager
        uses: actions/cache@v5
        with:
          path: ${{ env.PERL_LOCAL_LIB_ROOT }}
          key: imager-${{ env.IMAGER_RELEASE }}-${{ env.PERL_VERSION }}-v1

      - name: install Imager
        if: steps.cache-imager.outputs.cache-hit != 'true'
        run: |
            cpan Imager
      - name: perl version
        run: |
            perl -v
            perl -V
      - name: checkout
        uses: actions/checkout@v6
        with:
            path: main
      - name: configure
        run: |
            cd main
            perl Makefile.PL
      - name: build
        run: |
            cd main
            make -j2
      - name: dump encoders
        run: |
            cd main
            echo "Encoders:"
            perl -Mblib -MImager::File::HEIF -e 'Imager::File::HEIF->dump_encoders'
            echo "Decoders:"
            perl -Mblib -MImager::File::HEIF -e 'Imager::File::HEIF->dump_decoders'
            perl -Mblib -MImager::File::HEIF -le 'print "$_: ", Imager::File::HEIF->have_decoder_for($_) ? "Y" : "N" for Imager::File::HEIF->compression_names'
      - name: test
        run: |
            cd main
            make test
      - name: artifacts
        uses: actions/upload-artifact@v7
        with:
            name: logs-${{ inputs.libheif_release }}
            path: main/testout/
            retention-days: 7
